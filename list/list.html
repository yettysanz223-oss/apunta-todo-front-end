<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuntado ToDo</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="list.css">
    <link rel="shortcut icon" href="../images/fav_icon_apunta_todo.png" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <div class="cabecera cabecera-login">
            <a href="../index/index.html" class="logotipo">
                <img src="../images/logo_apunta_todo_con_nombre.png" alt="Logo Apunta_todo">
            </a>
            <nav class="navegacion-principal">
                <ul>
                    <li></li>
                </ul>
            </nav>
            <div class="user-area">
                <a href="../profile/profile.html">
                    <p>User Name</p>
                </a>
                <a href="../profile/profile.html"><span class="icon">👤</span></a>
            </div>
        </div>
    </header>

    <main>

        <div class="add-note">
            <input type="text" placeholder="Nombre de la lista..." id="inputTitulo">
            <button type="button" id="btnAgregarLista" class="boton">Crear</button>
        </div>

        <div class="cards-container" id="cards-container"></div>

        <dialog id="edit-dialog" class="dialog">
            <div class="card-header">
                <h3 contenteditable="true" id="tituloLista">Aseo fin de semana</h3>
                <div class="card-actions">
                    <button type="button" id="btnCerrar">❌</button>
                </div>
            </div>

            <div class="card-content" id="detalleLista" min>
                <ul id="detalleListaUl"></ul>
            </div>

            <div class="add-note">
                <input type="text" placeholder="Agregar producto..." id="inputNuevoItem">
                <button type="button" id="btnAgregarItem" class="boton">Crear</button>
            </div>

            <div class="card-actions">
                <button type="button" id="btnEliminar" class="boton">🗑️</button>
                <button type="button" id="btnGuardar" class="boton">💾</button>
                <p class="card-caption" id="fechaEdicion">Creado el: 29/11/2025</p>
            </div>

        </dialog>

        <dialog id="category-dialog" class="dialog category-dialog">
            <h4 id="category-dialog-title" class="category-dialog-title">¿Dónde va el producto?</h4>
            <div id="category-grid" class="category-grid" role="group" aria-label="Elegir categoría"></div>
            <button type="button" id="btnCancelarCategoria" class="boton boton-secundario">Cancelar</button>
        </dialog>

    </main>

    <footer>
        <div class="pie">
            <a href="#" class="logotipo">
                <img src="../images/logo_apunta_todo_con_nombre_gris.png" alt="Logo Apunta_todo">
            </a>
            <div class="redes">
                <img src="../images/icon_facebook.png" alt="icono facebook">
                <a href="https://www.facebook.com/" target="_blank">@facebook</a>
                <img src="../images/icon_whatsapp.png" alt="icono whatsapp">
                <a href="https://www.whatsapp.com/" target="_blank">@whatsapp</a>
                <img src="../images/icon_instagram.png" alt="icono instagram">
                <a href="https://www.instagram.com/" target="_blank">@instagram</a>
            </div>
        </div>
        <p class="derechos">Copyright ©️ 2025. Apunta ToDo. Todos los derechos reservados.</p>
        <p class="derechos">Proyecto Integrador - Cesde 2025</p>
    </footer>

    <script type="module" src="list.js"></script>
</body>

</html>
